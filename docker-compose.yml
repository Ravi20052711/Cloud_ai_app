version: '3.8'

services:
  backend:
    build: ./backend
    container_name: notify-backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/notify_ai.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen:4b
      - SECRET_KEY=enterprise_secret_key_123
    depends_on:
      - ollama
    networks:
      - notify-network

  frontend:
    build: ./frontend
    container_name: notify-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - notify-network

  ollama:
    image: ollama/ollama:latest
    container_name: notify-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Robust entrypoint to ensure model is pulled
    entrypoint: >
      /bin/sh -c "
      ollama serve & 
      sleep 10;
      echo 'Pulling model...';
      ollama pull qwen:4b;
      wait"
    networks:
      - notify-network

networks:
  notify-network:
    driver: bridge

volumes:
  ollama_data:
  sqlite_data:
